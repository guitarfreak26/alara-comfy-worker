name: Publish Temporary Public Image

on:
  workflow_dispatch:

env:
  TEMP_IMAGE: ttl.sh/alara-comfy-worker-seoyeon-zimage-v1-260519:24h

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push temporary public image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.TEMP_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
